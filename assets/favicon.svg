<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="guardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C2E0A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C2E0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A1E06;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Blade -->
  <path d="M32 4 L36 28 L32 26 L28 28 Z" fill="url(#bladeGrad)" stroke="#888" stroke-width="0.5"/>
  <!-- Blade fuller (center groove) -->
  <line x1="32" y1="6" x2="32" y2="24" stroke="#999" stroke-width="1" opacity="0.6"/>
  <!-- Cross guard -->
  <rect x="22" y="26" width="20" height="4" rx="1" fill="url(#guardGrad)" stroke="#3A1E06" stroke-width="0.5"/>
  <!-- Handle / Grip -->
  <rect x="29" y="30" width="6" height="18" rx="1" fill="url(#handleGrad)" stroke="#2A1004" stroke-width="0.5"/>
  <!-- Grip wrapping lines -->
  <line x1="29" y1="34" x2="35" y2="34" stroke="#8B4513" stroke-width="0.8" opacity="0.7"/>
  <line x1="29" y1="38" x2="35" y2="38" stroke="#8B4513" stroke-width="0.8" opacity="0.7"/>
  <line x1="29" y1="42" x2="35" y2="42" stroke="#8B4513" stroke-width="0.8" opacity="0.7"/>
  <line x1="29" y1="46" x2="35" y2="46" stroke="#8B4513" stroke-width="0.8" opacity="0.7"/>
  <!-- Pommel -->
  <circle cx="32" cy="52" r="4" fill="url(#guardGrad)" stroke="#3A1E06" stroke-width="0.5"/>
  <circle cx="32" cy="52" r="2" fill="#c0a000" opacity="0.8"/>
</svg>
